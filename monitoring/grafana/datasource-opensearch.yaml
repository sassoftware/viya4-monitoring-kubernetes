# Grafana OpenSearch datasource (secondary log search)
# Deployed as a ConfigMap with grafana_datasource=1 label for sidecar auto-provisioning
# NOTE: Placeholders (__ES_SERVICENAME__, __namespace__, etc.) are replaced
#       by the deploy script at deployment time.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-opensearch
  labels:
    grafana_datasource: "1"
    sas.com/monitoring-base: kube-viya-monitoring
data:
  datasource-opensearch.yaml: |
    apiVersion: 1
    deleteDatasources:
      - name: ViyaLogs
    prune: true
    datasources:
      - name: ViyaLogs
        type: grafana-opensearch-datasource
        url: https://__ES_SERVICENAME__.__namespace__:9200
        basicAuth: true
        basicAuthUser: __userID__
        version: 1
        jsonData:
          flavor: "OpenSearch"
          pplEnabled: false
          maxConcurrentShardRequests: 5
          database: viya_logs-*
          tlsSkipVerify: true
          timeField: "@timestamp"
          version: __opensearch_version__
          logMessageField: message
          logLevelField: level.keyword
        secureJsonData:
          basicAuthPassword: __passwd__
        editable: true
