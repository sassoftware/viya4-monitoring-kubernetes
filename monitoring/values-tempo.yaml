# =======
# Tempo
# =======
# https://github.com/grafana/helm-charts/blob/main/charts/tempo/

tempo:
  searchEnabled: true

  multitenancyEnabled: false
  # -- If true, Tempo will report anonymous usage data about the shape of a deployment to Grafana Labs
  reportingEnabled: false

  metricsGenerator:
    # -- If true, enables Tempo's metrics generator (https://grafana.com/docs/tempo/next/metrics-generator/)
    enabled: true
    # NOTE: __MON_NS__ and __RELEASE_PREFIX__ are replaced at deploy time by deploy_monitoring_cluster.sh
    remoteWriteUrl: "http://__RELEASE_PREFIX__-prometheus-server.__MON_NS__:80/api/v1/write"

  # Processor activation and configuration must go in tempo.overrides.defaults
  # because the chart template only generates storage config under metrics_generator.
  # Uses the new overrides format (Tempo >= 2.7) with the "defaults" key.
  # Field names under "defaults" use the new structure: ingestion.*, metrics_generator.*, etc.
  overrides:
    defaults:
      ingestion:
        max_traces_per_user: 5000000
        burst_size_bytes: 500000000
        rate_limit_bytes: 500000000
      metrics_generator:
        processors:
          - service-graphs
          - span-metrics
          - local-blocks
        # Note: registry.external_labels is not a valid overrides field.
        # max_items/wait for service_graphs are main config, not overrides.
        processor:
          service_graphs:
            dimensions:
              - k8s.namespace.name
              - http.request.method
            enable_client_server_prefix: true
          span_metrics:
            dimensions:
              - http.request.method
              - http.response.status_code
              - http.route
              - k8s.namespace.name
              - server.address
              - rpc.service
              - rpc.method
            enable_target_info: true
            histogram_buckets: [0.002, 0.004, 0.008, 0.016, 0.032, 0.064, 0.128, 0.256, 0.512, 1.02, 2.048, 4.096, 8.192, 16.384]

  retention: 24h

  # Tempo server configuration
  # Refers to https://grafana.com/docs/tempo/latest/configuration/#server
  server:
    # -- HTTP server listen port
    http_listen_port: 3200
    grpc_server_max_recv_msg_size: 500000000
    grpc_server_max_send_msg_size: 500000000

  querier:
    frontend_worker:
      grpc_client_config:
        max_send_msg_size: 500000000
    trace_by_id:
      query_timeout: "60s"
    search:
      query_timeout: "120s"
    max_concurrent_queries: 50

  storage:
    trace:
      # tempo storage backend
      # refer https://grafana.com/docs/tempo/latest/configuration/
      backend: local
      local:
        path: /var/tempo/traces
      wal:
        path: /var/tempo/wal
  # this configuration will listen on all ports and protocols that tempo is capable of.
  # the receives all come from the OpenTelemetry collector.  more configuration information can
  # be found there: https://github.com/open-telemetry/opentelemetry-collector/tree/master/receiver
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

serviceAccount:
  # -- Specifies whether a ServiceAccount should be created
  create: true
  # -- The name of the ServiceAccount to use.
  # If not set and create is true, a name is generated using the fullname template
  name: __RELEASE_PREFIX__-tempo
  automountServiceAccountToken: false

service:
  type: ClusterIP
  annotations: {}
  labels: {}

serviceMonitor:
  enabled: true
  interval: ""
  additionalLabels: {}
  annotations: {}
  # scrapeTimeout: 10s

persistence:
  enabled: true
  # storageClassName:
  accessModes:
    - ReadWriteOnce
  size: 50Gi
