# Override values for the Grafana Loki Helm chart
#
# Grafana Loki Helm Chart
# https://github.com/grafana/loki/tree/main/production/helm/loki
#
# Loki is deployed in SingleBinary mode with local filesystem storage.
# Structured metadata is enabled to store OTel TraceId/SpanId fields
# for trace correlation without indexing.

deploymentMode: SingleBinary

# ========================
# Loki Configuration
# ========================
loki:
  auth_enabled: false

  # Enable OTLP ingestion — Loki 3.x native support
  # When Alloy sends OTel-format logs, Loki automatically extracts
  # TraceId and SpanId from OTel log records and stores them as
  # structured metadata.

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: filesystem

  limits_config:
    # CRITICAL: Enable structured metadata for trace correlation
    # This allows OTel TraceId/SpanId to be stored as queryable metadata
    # without being high-cardinality indexed labels
    allow_structured_metadata: true
    retention_period: 720h  # 30 days
    max_query_series: 5000
    ingestion_burst_size_mb: 20
    ingestion_rate_mb: 10

  ingester:
    chunk_encoding: snappy

# ========================
# SingleBinary
# ========================
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 50Gi
    # storageClassName:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi

# Disable scalable components (not used in SingleBinary mode)
write:
  replicas: 0
read:
  replicas: 0
backend:
  replicas: 0

# ========================
# Gateway
# ========================
gateway:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

# ========================
# Disable sidecars (rules managed by Prometheus, not Loki ruler)
# ========================
sidecar:
  rules:
    enabled: false

# ========================
# Disable sub-charts managed elsewhere
# ========================
# These are handled by k8s-monitoring or not needed
chunksCache:
  enabled: false

resultsCache:
  enabled: false

# Disable bundled monitoring — handled by k8s-monitoring
monitoring:
  selfMonitoring:
    enabled: false

lokiCanary:
  enabled: false
canary:
  enabled: false

test:
  enabled: false

# ========================
# Service Account
# ========================
serviceAccount:
  create: true
  name: v4m-loki
  automountServiceAccountToken: false
