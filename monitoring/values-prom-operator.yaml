# Override values for the Prometheus Operator helm chart
#
# Prometheus Operator Helm Chart
# https://https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack
#
# CRDs
# https://github.com/coreos/prometheus-operator/blob/master/Documentation/api.md
#
# Default Values
# https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml

## NOTE: All image.*, imagePullSecrets and related keys now derived from environment variables and generated at run-time (DO NOT SET HERE)
##       See monitoring/prom-operator_container_image.template for complete list
###global:
###  imageRegistry: foo
###  imagePullSecrets: foo
###prometheusOperator:
###  image:
###    registry: foo
###    repository: foo
###    tag: foo
###    pullPolicy: foo

commonLabels:
  sas.com/monitoring-base: kube-viya-monitoring

# ===================
# Prometheus Operator
# ===================
# https://github.com/coreos/prometheus-operator
prometheusOperator:
  ###  image:   # See NOTE at top of file
  logFormat: json
  logLevel: info
  createCustomResource: false
  # Scope operator to its own namespace to avoid conflicts with
  # other prometheus-operator instances on the same cluster
  namespaces:
    releaseNamespace: true
    additional: []
  resources:
    requests:
      cpu: "100m"
      memory: "50Mi"
    limits:
      cpu: "500m"
      memory: "2Gi"
  tlsProxy:
    resources:
      requests:
        cpu: "50m"
        memory: "25Mi"
  #prometheusConfigReloader:
  # image:   # See NOTE at top of file

# ================================================
# Disable all collection — handled by k8s-monitoring
# ================================================
kubelet:
  enabled: false

kubeApiServer:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

kubeEtcd:
  enabled: false

coreDns:
  enabled: false

kubeStateMetrics:
  enabled: false

nodeExporter:
  enabled: false

# ==========
# Prometheus (remote-write TSDB — no direct scraping)
# ==========
prometheus:
  serviceAccount:
    name: sas-ops-acct
  service:
    type: ClusterIP
    nodePort: null
  prometheusSpec:
    #image:   # See NOTE at top of file
    logLevel: info
    logFormat: json
    podAntiAffinity: soft
    # Accept remote-write from Alloy (k8s-monitoring) and Tempo metrics_generator
    enableRemoteWriteReceiver: true
    # Enable exemplar storage for metric → trace correlation
    # Exemplars attach trace_id to metric samples, enabling:
    # Grafana metric panel → exemplar dots → click → open trace in Tempo
    enableFeatures:
      - exemplar-storage
    # Prevent direct scraping — all collection handled by k8s-monitoring Alloy
    serviceMonitorSelector:
      matchLabels:
        prometheus-scrape: "disabled"
    podMonitorSelector:
      matchLabels:
        prometheus-scrape: "disabled"
    # Still process ALL PrometheusRules for alerting
    ruleSelectorNilUsesHelmValues: false
    retention: 7d
    retentionSize: 40GiB
    replicas: 1
    resources:
      # These values may very well need to be overridden to higher
      # values depending on the scale of the cluster
      requests:
        cpu: "1000m"
        memory: "2Gi"
    storageSpec:
      volumeClaimTemplate:
        spec:
          # storageClassName:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 50Gi
          volumeMode: Filesystem
    alertingEndpoints:
      - name: __RELEASE_PREFIX__-alertmanager
        port: http-web

# =======================
# Prometheus AlertManager
# =======================
alertmanager:
  service:
    type: ClusterIP
    nodePort: null
  alertmanagerSpec:
    #image: # See NOTE at top of file
    logFormat: json
    podAntiAffinity: soft
    retention: 240h
    resources:
      requests:
        cpu: "50m"
        memory: "50Mi"
    storage:
      volumeClaimTemplate:
        spec:
          # storageClassName:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
          volumeMode: Filesystem

# =======================
# Prometheus Node Exporter — DISABLED (handled by k8s-monitoring)
# =======================

# =======
# Grafana
# =======
# https://github.com/grafana/helm-charts/tree/main/charts/grafana
grafana:
  #image: See NOTE at top of file
  initChownData:
    enabled: false
  "grafana.ini":
    analytics:
      check_for_updates: false
    log:
      mode: console
    "log.console":
      format: json
    dashboards:
      default_home_dashboard_path: /tmp/dashboards/viya-welcome-dashboard.json
    feature_toggles:
      prometheusSpecialCharsInLabelValues: true

  service:
    type: NodePort
    nodePort: 31100
  testFramework:
    enabled: false
  plugins: []
  resources:
    requests:
      cpu: "250m"
      memory: "150Mi"
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
    datasources:
      enabled: true
      label: grafana_datasource
      defaultDatasourceEnabled: false
    resources:
      requests:
        cpu: "50m"
        memory: "100Mi"
    #image: See NOTE at top of file
  prune: true
  deploymentStrategy:
    type: Recreate
  persistence:
    type: pvc
    enabled: true
    # storageClassName:
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    # annotations: {}
    finalizers:
      - kubernetes.io/pvc-protection
    # subPath: ""
    # existingClaim:
  extraVolumes:
    - name: grafana-alert-rules
      configMap:
        name: grafana-alert-rules
  extraVolumeMounts:
    - name: grafana-alert-rules
      mountPath: /etc/grafana/provisioning/alerting
