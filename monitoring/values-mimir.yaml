# Mimir Helm chart values for POC deployment
#
# mimir-distributed Helm chart
# https://github.com/grafana/mimir/tree/main/operations/helm/charts/mimir-distributed
# Default values:
# https://github.com/grafana/mimir/blob/main/operations/helm/charts/mimir-distributed/values.yaml
#
# Uses MinIO as a self-contained S3-compatible object store so all distributed
# components (compactor, ingester, querier, store-gateway, etc.) can share the
# same storage — filesystem storage does not work in a distributed deployment
# because each pod has its own PVC.
#
# NOT production-ready:
#   - No replication: replication_factor=1, a pod restart loses in-flight data
#   - MinIO credentials are plaintext (supersecret)
# For production, replace MinIO with S3, GCS, or Azure Blob and remove plaintext creds.

mimir:
  structuredConfig:
    # S3-compatible storage via bundled MinIO
    common:
      storage:
        backend: s3
        s3:
          endpoint: v4m-mimir-minio:9000
          access_key_id: mimir
          secret_access_key: supersecret
          insecure: true
    blocks_storage:
      s3:
        bucket_name: mimir-blocks
    compactor:
      data_dir: /data/mimir/compactor
    ruler_storage:
      s3:
        bucket_name: mimir-ruler
    alertmanager_storage:
      s3:
        bucket_name: mimir-alertmanager
    # Single-replica ring configuration (POC only)
    ingester:
      ring:
        replication_factor: 1
    store_gateway:
      sharding_ring:
        replication_factor: 1

# Single ingester replica; zone-aware replication requires 3+
ingester:
  replicas: 1
  zoneAwareReplication:
    enabled: false

# Single store-gateway replica
store_gateway:
  replicas: 1
  zoneAwareReplication:
    enabled: false

# MinIO: self-contained S3-compatible object store for POC
minio:
  enabled: true
  persistence:
    size: 50Gi
  rootUser: mimir
  rootPassword: supersecret
  buckets:
    - name: mimir-blocks
      policy: none
      purge: false
    - name: mimir-ruler
      policy: none
      purge: false
    - name: mimir-alertmanager
      policy: none
      purge: false

# Enable the nginx gateway (the push/query entry point)
nginx:
  enabled: true
