apiVersion: apps/v1
kind: Deployment
metadata:
  name: v4m-mcp-server
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: v4m-mcp-server
  template:
    metadata:
      labels:
        app: v4m-mcp-server
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: mcp
        image: viyamonitoring.azurecr.io/v4m-mcp-server:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: PROMETHEUS_URL
          value: "https://prometheus-operated.monitoring.svc:9090"
        - name: PORT
          value: "8000"
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /mcp/
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /mcp/
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 30
